<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이고고 팀 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ✅ Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, getDocFromServer, setDoc, updateDoc, collection, getDocs, onSnapshot, enableNetwork }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ══════════════════════════════════════════
  // 🔧 여기에 Firebase 설정값을 붙여넣으세요
  // ══════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyBdblYWOcFBz0vwfINCvnQCBwKGusS0A0w",
    authDomain: "igogo-dashboard.firebaseapp.com",
    projectId: "igogo-dashboard",
    storageBucket: "igogo-dashboard.firebasestorage.app",
    messagingSenderId: "441414216798",
    appId: "1:441414216798:web:1e50381da350bb3c3a18cf"
  };
  // ══════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ── 팀원 정보 (관리자가 사전 정의) ──────────────────
  const TEAM_MEMBERS = {
    "moon@igogo.kr":   { name: "문수빈", role: "운영마케팅", color: "#4f8aff", isAdmin: false },
    "ijkim@igogo.kr":    { name: "김일주", role: "디자인",     color: "#a78bfa", isAdmin: false },
    "sjkim@igogo.kr": { name: "김승진", role: "개발",       color: "#2dd4a0", isAdmin: false },
    "alex@igogo.kr":    { name: "박지호", role: "세일즈",     color: "#f5a623", isAdmin: false },
    "kim0914@igogo.kr":  { name: "김유정", role: "콘텐츠",     color: "#f472b6", isAdmin: false },
    "ywseong@igogo.kr":{ name: "성영운", role: "고객경험",  color: "#38bdf8", isAdmin: false },
    "junpark@igogo.kr":       { name: "박형준", role: "팀 리더",    color: "#ffffff", isAdmin: true  },
  };

  const MONTH_PHRASE = "재방문을 자극하는 프로덕트로, 훌륭한 파트너의 양질의 체험으로, 더 많은 콘텐츠를 통해 더 많은 유입으로, 효율적인 매체/외부채널/앱 운영관리로 역대 최대 실적을 기록하는 6~8월을 위하여";

  // ── 상태 ────────────────────────────────────
  let currentUser = null;
  let currentMember = null;
  let currentMonth = "2026-06";
  let dashboardData = {};
  let unsubscribe = null;

  // ── 로그인 ───────────────────────────────────
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ hd: "igogo.kr" });
  window.doGoogleLogin = async () => {
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      if (e.code === "auth/popup-closed-by-user") return;
      errEl.textContent = "로그인 실패. igogo.kr 계정으로 시도해주세요.";
    }
  };
  window.doLogout = async () => {
    if (unsubscribe) unsubscribe();
    await signOut(auth);
  };

  // ── Auth 상태 변경 ───────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      currentMember = TEAM_MEMBERS[user.email] || { name: user.email, role: "", color: "#fff", isAdmin: false };
      showApp();
    } else {
      currentUser = null;
      currentMember = null;
      showLogin();
    }
  });

  // ── 화면 전환 ────────────────────────────────
  function showLogin() {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-screen").style.display   = "none";
  }
  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display   = "block";
    document.getElementById("user-name").textContent  = currentMember.name;
    document.getElementById("user-role").textContent  = currentMember.role;
    document.getElementById("user-avatar").style.background = currentMember.color;
    document.getElementById("user-avatar").textContent = currentMember.name[0];

    if (currentMember.isAdmin) {
      setTimeout(function(){ loadAdminView(); }, 500);
    } else {
      loadMemberDashboard();
    }
  }

  // ── 월 선택 ──────────────────────────────────
  window.changeMonth = (m) => {
    currentMonth = m;
    document.querySelectorAll(".month-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(`[data-month="${m}"]`)?.classList.add("active");
    if (currentMember.isAdmin) loadAdminView(); else loadMemberDashboard();
  };

  // ══════════════════════════════════════════════
  //  팀원 대시보드
  // ══════════════════════════════════════════════
  async function loadMemberDashboard() {
    const email = currentUser.email;
    const docRef = doc(db, "dashboards", email, "months", currentMonth);

    // 실시간 리스닝
    if (unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(docRef, snap => {
      if (snap.exists()) {
        dashboardData = snap.data();
      } else {
        dashboardData = getInitialData(email);
      }
      renderDashboard();
    });
  }

  function getInitialData(email) {
    if (currentMonth === "2026-06") {
      return { items: getItemsForMember(email), memos: {}, retro: {}, updatedAt: null };
    }
    return { items: [], memos: {}, retro: {}, updatedAt: null };
  }

  // ── 아이템 렌더 ──────────────────────────────
  function renderDashboard() {
    const items = dashboardData.items || [];
    const memos = dashboardData.memos || {};
    const retro = dashboardData.retro || {};

    // 해당 월 데이터 없으면 빈 화면
    if (items.length === 0 && currentMonth !== "2026-06") {
      document.getElementById("stat-total").textContent  = "—";
      document.getElementById("stat-done").textContent   = "—";
      document.getElementById("stat-doing").textContent  = "—";
      document.getElementById("stat-pct").textContent    = "—";
      document.getElementById("progress-fill").style.width = "0%";
      document.getElementById("dashboard-content").innerHTML =
        '<div style="text-align:center;padding:80px 20px;color:var(--gray)">' +
        '<div style="font-size:32px;margin-bottom:16px">📋</div>' +
        '<div style="font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px">' + currentMonth.replace("2026-","") + '월 액션아이템 준비 중</div>' +
        '<div style="font-size:13px;line-height:1.8">이 달의 액션아이템은 아직 등록되지 않았습니다.<br>팀 리더가 다음 달 아이템을 추가하면 여기에 표시됩니다.</div>' +
        '</div>';
      return;
    }

    const done   = items.filter(i => i.status === "done").length;
    const doing  = items.filter(i => i.status === "doing").length;
    const total  = items.length;
    const pct    = total ? Math.round(done / total * 100) : 0;

    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-done").textContent  = done;
    document.getElementById("stat-doing").textContent = doing;
    document.getElementById("stat-pct").textContent   = pct + "%";
    document.getElementById("progress-fill").style.width = pct + "%";

    document.getElementById("month-phrase").textContent = MONTH_PHRASE;
    document.getElementById("dashboard-name").textContent = currentMember.name;
    document.getElementById("dashboard-role").textContent = currentMember.role;
    document.getElementById("dashboard-month").textContent = currentMonth;
    document.getElementById("dashboard-accent").style.color = currentMember.color;

    // 섹션별 그룹
    const sections = {};
    items.forEach(item => {
      if (!sections[item.section]) sections[item.section] = [];
      sections[item.section].push(item);
    });

    let html = "";
    Object.entries(sections).forEach(([section, sItems]) => {
      html += `<div class="section">
        <div class="section-header">
          <span class="section-dot" style="background:${currentMember.color}"></span>
          <span class="section-title">${section}</span>
          <span class="section-count">${sItems.filter(i=>i.status==='done').length}/${sItems.length}</span>
        </div>`;
      sItems.forEach(item => {
        const s = item.status || "todo";
        const memo = memos[item.id] || "";
        html += `
        <div class="item-card ${s}" id="card-${item.id}">
          <div class="item-header" onclick="toggleCard('${item.id}')">
            <div class="status-btn" onclick="event.stopPropagation();cycleStatus('${item.id}')"
              style="border-color:${s==='done'?'#34d97b':s==='doing'?'#f5c842':'#3a3f55'};
                     background:${s==='done'?'#34d97b':s==='doing'?'#f5c842':'transparent'}">
              ${s==='done'?'<svg viewBox="0 0 10 10" width="10" height="10"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="#0d0f14" stroke-width="2" fill="none" stroke-linecap="round"/></svg>'
                         :(s==='doing'?'<div style="width:6px;height:6px;border-radius:50%;background:#0d0f14;margin:auto"></div>':'')}
            </div>
            <span class="item-label ${s==='done'?'done-text':''}">${item.label}</span>
            ${item.tag?`<span class="item-tag">${item.tag}</span>`:''}
            ${item.priority?`<span class="prio-badge prio-${item.priority}">${item.priority}순위</span>`:''}
            <span class="status-text ${s}">${{todo:'진행전',doing:'진행중',done:'완료',hold:'보류'}[s]}</span>
          </div>
          <div class="item-body" id="body-${item.id}">
            ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
            <div class="memo-area">
              <div class="memo-label">비고 / 진행 메모</div>
              <textarea class="memo-input" id="memo-${item.id}"
                placeholder="진행 현황, 수치, 인사이트를 기록하세요..."
                onblur="saveMemo('${item.id}', this.value)">${memo}</textarea>
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });

    // 회고 섹션
    html += `
    <div class="section retro-section">
      <div class="section-header">
        <span class="section-dot" style="background:#ff5c5c"></span>
        <span class="section-title">${currentMonth} 월간 회고</span>
        <span class="section-count" style="color:#ff5c5c">발표용</span>
      </div>
      ${[
        ["retro-result",  "이달의 가장 큰 성과 (수치 기반)"],
        ["retro-miss",    "완수하지 못한 항목 & 이유"],
        ["retro-insight", "다음 달에 가져갈 인사이트 / 개선 방향"],
        ["retro-kpi",     "주간 KPI 트래킹 (매주 업데이트)"],
      ].map(([key, label]) => `
      <div class="retro-card">
        <div class="memo-label">${label}</div>
        <textarea class="memo-input retro-input" id="${key}"
          placeholder="${label}..."
          onblur="saveRetro('${key}', this.value)">${retro[key]||''}</textarea>
      </div>`).join('')}
    </div>`;

    document.getElementById("dashboard-content").innerHTML = html;
  }

  // ── 상태 순환 ────────────────────────────────
  window.cycleStatus = async (itemId) => {
    const statuses = ["todo","doing","done","hold"];
    const items = [...(dashboardData.items || [])];
    const idx = items.findIndex(i => i.id === itemId);
    if (idx < 0) return;
    const cur = items[idx].status || "todo";
    items[idx].status = statuses[(statuses.indexOf(cur)+1) % statuses.length];
    await saveData({ items });
  };

  // ── 메모 저장 ────────────────────────────────
  window.saveMemo = async (itemId, value) => {
    const memos = { ...(dashboardData.memos || {}), [itemId]: value };
    await saveData({ memos });
  };
  window.saveRetro = async (key, value) => {
    const retro = { ...(dashboardData.retro || {}), [key]: value };
    await saveData({ retro });
  };

  async function saveData(partial) {
    const email = currentUser.email;
    const docRef = doc(db, "dashboards", email, "months", currentMonth);
    const merged = { ...dashboardData, ...partial, updatedAt: new Date().toISOString() };
    await setDoc(docRef, merged, { merge: true });
  }

  // ── 카드 토글 ────────────────────────────────
  window.toggleCard = (id) => {
    document.getElementById("body-" + id)?.classList.toggle("open");
  };

  // ══════════════════════════════════════════════
  //  관리자 뷰
  // ══════════════════════════════════════════════
  async function loadAdminView() {
    document.getElementById("dashboard-name").textContent = "팀 전체 현황";
    document.getElementById("dashboard-role").textContent = "리더 뷰";
    document.getElementById("dashboard-month").textContent = currentMonth;
    document.getElementById("month-phrase").textContent = MONTH_PHRASE;

    const members = Object.entries(TEAM_MEMBERS).filter(function(e){ return !e[1].isAdmin; });

    // Firestore 네트워크 연결 확보 후 읽기
    try { await enableNetwork(db); } catch(e) {}

    for (var mi = 0; mi < members.length; mi++) {
      var email  = members[mi][0];
      var info   = members[mi][1];
      var safeId = "mbr_" + email.replace(/[^a-zA-Z0-9]/g, "_");
      var items  = getItemsForMember(email);
      var memos  = {};

      // 최대 3회 재시도
      for (var attempt = 0; attempt < 3; attempt++) {
        try {
          var docRef = doc(db, "dashboards", email, "months", currentMonth);
          var snap   = await getDoc(docRef);
          if (snap.exists()) {
            var d = snap.data();
            if (d.items && d.items.length > 0) { items = d.items; }
            memos = d.memos || {};
          }
          break; // 성공하면 재시도 중단
        } catch(err) {
          if (attempt < 2) {
            await new Promise(function(r){ setTimeout(r, 800); }); // 0.8초 대기 후 재시도
          } else {
            console.warn("read failed after retries:", email, err.message);
          }
        }
      }
      allData.push({ email: email, safeId: safeId, info: info, items: items, memos: memos });
    }

    var totalAll = 0, doneAll = 0, doingAll = 0;
    for (var i = 0; i < allData.length; i++) {
      totalAll += allData[i].items.length;
      doneAll  += allData[i].items.filter(function(x){ return x.status === "done";  }).length;
      doingAll += allData[i].items.filter(function(x){ return x.status === "doing"; }).length;
    }
    var pctAll = totalAll ? Math.round(doneAll / totalAll * 100) : 0;
    document.getElementById("stat-total").textContent = totalAll;
    document.getElementById("stat-done").textContent  = doneAll;
    document.getElementById("stat-doing").textContent = doingAll;
    document.getElementById("stat-pct").textContent   = pctAll + "%";
    document.getElementById("progress-fill").style.width = pctAll + "%";

    var container = document.getElementById("dashboard-content");
    container.innerHTML = "";

    // 요약 카드 그리드
    var grid = document.createElement("div");
    grid.className = "admin-grid";
    container.appendChild(grid);

    for (var ci = 0; ci < allData.length; ci++) {
      (function(d) {
        var done  = d.items.filter(function(x){ return x.status === "done";  }).length;
        var doing = d.items.filter(function(x){ return x.status === "doing"; }).length;
        var total = d.items.length;
        var pct   = total ? Math.round(done / total * 100) : 0;

        var card = document.createElement("div");
        card.className = "admin-card";

        var top = document.createElement("div");
        top.className = "admin-card-top";
        top.innerHTML =
          "<div class='admin-avatar' style='background:" + d.info.color + ";color:#0d0f14'>" + d.info.name[0] + "</div>" +
          "<div><div class='admin-name'>" + d.info.name + "</div><div class='admin-role'>" + d.info.role + "</div></div>" +
          "<div class='admin-pct' style='color:" + d.info.color + "'>" + pct + "%</div>";

        var barWrap = document.createElement("div");
        barWrap.className = "admin-bar-wrap";
        barWrap.innerHTML = "<div class='admin-bar'><div class='admin-bar-fill' style='width:" + pct + "%;background:" + d.info.color + "'></div></div>";

        var stats = document.createElement("div");
        stats.className = "admin-stats";
        stats.innerHTML =
          "<span>전체 <b>" + total + "</b></span>" +
          "<span style='color:#34d97b'>완료 <b>" + done  + "</b></span>" +
          "<span style='color:#f5c842'>진행중 <b>" + doing + "</b></span>" +
          "<span style='color:#8890a4'>미완 <b>" + (total - done - doing) + "</b></span>";

        var hint = document.createElement("div");
        hint.className = "card-expand-hint";
        hint.textContent = "클릭하여 액션아이템 보기";

        card.appendChild(top);
        card.appendChild(barWrap);
        card.appendChild(stats);
        card.appendChild(hint);
        card.addEventListener("click", function() { window.toggleMemberDetail(d.safeId); });
        grid.appendChild(card);
      })(allData[ci]);
    }

    // 팀원별 상세 블록
    for (var bi = 0; bi < allData.length; bi++) {
      (function(d) {
        var done  = d.items.filter(function(x){ return x.status === "done"; }).length;
        var total = d.items.length;

        var block = document.createElement("div");
        block.className = "member-detail-block";
        block.id = d.safeId;

        var hdr = document.createElement("div");
        hdr.style.cssText = "display:flex;align-items:center;padding:12px 16px;border-left:3px solid " + d.info.color + ";background:var(--surface2);border-radius:8px;margin-bottom:16px";
        hdr.innerHTML =
          "<div class='admin-avatar' style='background:" + d.info.color + ";color:#0d0f14;width:28px;height:28px;font-size:12px;margin-right:10px'>" + d.info.name[0] + "</div>" +
          "<span style='color:" + d.info.color + ";font-weight:700;font-size:16px'>" + d.info.name + "</span>" +
          "<span style='color:#8890a4;margin-left:8px;font-size:13px'>" + d.info.role + "</span>" +
          "<span style='font-family:var(--mono);font-size:12px;margin-left:auto;color:" + d.info.color + "'>" + (total ? Math.round(done/total*100) : 0) + "% 완료</span>";
        block.appendChild(hdr);

        var sections = {};
        d.items.forEach(function(item) {
          if (!sections[item.section]) sections[item.section] = [];
          sections[item.section].push(item);
        });

        Object.entries(sections).forEach(function(se) {
          var secName  = se[0];
          var sItems   = se[1];
          var secEl    = document.createElement("div");
          secEl.className = "section";
          secEl.style.marginBottom = "16px";

          var secHdr = document.createElement("div");
          secHdr.className = "section-header";
          secHdr.innerHTML =
            "<span class='section-dot' style='background:" + d.info.color + "'></span>" +
            "<span class='section-title'>" + secName + "</span>" +
            "<span class='section-count'>" + sItems.filter(function(x){ return x.status==="done"; }).length + "/" + sItems.length + "</span>";
          secEl.appendChild(secHdr);

          sItems.forEach(function(item) {
            var s      = item.status || "todo";
            var label  = { todo:"진행전", doing:"진행중", done:"완료", hold:"보류" }[s];
            var memo   = d.memos[item.id] || "";
            var bcol   = s==="done" ? "#34d97b" : s==="doing" ? "#f5c842" : "#3a3f55";
            var bgcol  = s==="done" ? "#34d97b" : s==="doing" ? "#f5c842" : "transparent";
            var check  = s==="done" ? "<svg viewBox='0 0 10 10' width='10' height='10'><path d='M1.5 5l2.5 2.5 4.5-5' stroke='#0d0f14' stroke-width='2' fill='none' stroke-linecap='round'/></svg>" : "";
            var tagH   = item.tag      ? "<span class='item-tag'>"                              + item.tag      + "</span>" : "";
            var prioH  = item.priority ? "<span class='prio-badge prio-" + item.priority + "'>" + item.priority + "순위</span>" : "";
            var memoH  = memo          ? "<div class='admin-memo'>\uD83D\uDCAC " + memo + "</div>" : "";

            var itemEl = document.createElement("div");
            itemEl.className = "item-card " + s;
            itemEl.innerHTML =
              "<div class='item-header'>" +
                "<div class='status-btn' style='border-color:" + bcol + ";background:" + bgcol + "'>" + check + "</div>" +
                "<span class='item-label" + (s==="done" ? " done-text" : "") + "'>" + item.label + "</span>" +
                tagH + prioH +
                "<span class='status-text " + s + "'>" + label + "</span>" +
              "</div>" + memoH;
            secEl.appendChild(itemEl);
          });
          block.appendChild(secEl);
        });
        container.appendChild(block);
      })(allData[bi]);
    }
  }

  window.toggleMemberDetail = function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var isOpen = el.classList.contains("open");
    document.querySelectorAll(".member-detail-block").forEach(function(b){ b.classList.remove("open"); });
    if (!isOpen) {
      el.classList.add("open");
      setTimeout(function(){ el.scrollIntoView({ behavior:"smooth", block:"start" }); }, 50);
    }
  };


  window.viewMemberDetail = async (email) => {
    const info = TEAM_MEMBERS[email];
    const docRef = doc(db, "dashboards", email, "months", currentMonth);
    const snap = await getDocFromServer(docRef);
    const data = snap.exists() ? snap.data() : { items: getItemsForMember(email) };
    const items = data.items || [];
    const memos = data.memos || {};
    const retro = data.retro || {};

    const done = items.filter(i=>i.status==='done').length;
    const total = items.length;

    let html = `
    <div class="back-btn" onclick="${currentMember.isAdmin?'loadAdminView()':''}">← 전체 현황으로</div>
    <div class="member-detail-header" style="border-left:3px solid ${info.color}">
      <span style="color:${info.color};font-weight:700;font-size:18px">${info.name}</span>
      <span style="color:#8890a4;margin-left:8px">${info.role}</span>
      <span style="font-family:var(--mono);font-size:12px;margin-left:auto;color:${info.color}">${total?Math.round(done/total*100):0}% 완료</span>
    </div>`;

    const sections = {};
    items.forEach(item => {
      if (!sections[item.section]) sections[item.section] = [];
      sections[item.section].push(item);
    });

    Object.entries(sections).forEach(([section, sItems]) => {
      html += `<div class="section"><div class="section-header">
        <span class="section-dot" style="background:${info.color}"></span>
        <span class="section-title">${section}</span>
        <span class="section-count">${sItems.filter(i=>i.status==='done').length}/${sItems.length}</span>
      </div>`;
      sItems.forEach(item => {
        const s = item.status || "todo";
        const memo = memos[item.id] || "";
        html += `<div class="item-card ${s}">
          <div class="item-header">
            <div class="status-btn" style="border-color:${s==='done'?'#34d97b':s==='doing'?'#f5c842':'#3a3f55'};
              background:${s==='done'?'#34d97b':s==='doing'?'#f5c842':'transparent'}">
              ${s==='done'?'<svg viewBox="0 0 10 10" width="10" height="10"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="#0d0f14" stroke-width="2" fill="none" stroke-linecap="round"/></svg>':''}
            </div>
            <span class="item-label ${s==='done'?'done-text':''}">${item.label}</span>
            <span class="status-text ${s}">${{todo:'진행전',doing:'진행중',done:'완료',hold:'보류'}[s]}</span>
          </div>
          ${memo?`<div class="admin-memo">${memo}</div>`:''}
        </div>`;
      });
      html += `</div>`;
    });

    if (retro['retro-result'] || retro['retro-insight']) {
      html += `<div class="section retro-section"><div class="section-header">
        <span class="section-dot" style="background:#ff5c5c"></span>
        <span class="section-title">회고</span></div>`;
      if (retro['retro-result'])  html += `<div class="retro-read"><b>성과:</b> ${retro['retro-result']}</div>`;
      if (retro['retro-miss'])    html += `<div class="retro-read"><b>미완수:</b> ${retro['retro-miss']}</div>`;
      if (retro['retro-insight']) html += `<div class="retro-read"><b>인사이트:</b> ${retro['retro-insight']}</div>`;
      html += `</div>`;
    }

    document.getElementById("dashboard-content").innerHTML = html;
  };

  --text2: #adb3c8;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --green: #34d97b;
  --yellow: #f5c842;
  --red: #ff5c5c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }

/* ── LOGIN ── */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
  background: radial-gradient(ellipse at 30% 40%, rgba(79,138,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(124,92,252,0.06) 0%, transparent 50%),
              var(--bg);
}
.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:40px 36px; width:380px;
}
.login-logo { font-family:var(--mono); font-size:11px; color:#4f8aff; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; }
.login-title { font-size:22px; font-weight:700; margin-bottom:4px; }
.login-sub { font-size:12px; color:var(--gray); margin-bottom:28px; }
.login-label { font-size:11px; color:var(--gray); margin-bottom:6px; font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; }
.login-input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:11px 14px; color:var(--text); font-family:var(--sans); font-size:14px;
  outline:none; transition:border-color 0.2s; margin-bottom:14px;
}
.login-input:focus { border-color:#4f8aff; }
.login-btn {
  width:100%; background:#4f8aff; border:none; border-radius:8px;
  padding:12px; color:#fff; font-family:var(--sans); font-size:14px; font-weight:600;
  cursor:pointer; transition:opacity 0.2s; margin-top:4px;
}
.login-btn:hover { opacity:0.85; }
.google-btn { width:100%; background:#fff; border:1px solid #dadce0; border-radius:8px; padding:11px 14px; color:#3c4043; font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:box-shadow 0.2s; margin-top:8px; }
.google-btn:hover { box-shadow:0 1px 6px rgba(0,0,0,0.2); }
.login-error { color:var(--red); font-size:12px; margin-top:8px; min-height:18px; }

/* ── APP ── */
#app-screen { display:none; }
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 32px; height:56px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-family:var(--mono); font-size:11px; color:#4f8aff; letter-spacing:0.05em; margin-right:8px; font-weight:500; }
.month-btn {
  font-family:var(--mono); font-size:11px; padding:5px 12px; border-radius:6px;
  border:1px solid var(--border); background:transparent; color:var(--gray);
  cursor:pointer; transition:all 0.15s;
}
.month-btn.active, .month-btn:hover { border-color:#4f8aff; color:#4f8aff; background:rgba(79,138,255,0.08); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.user-chip { display:flex; align-items:center; gap:8px; }
#user-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#0d0f14; }
#user-name { font-size:13px; font-weight:500; }
#user-role { font-size:11px; color:var(--gray); }
.logout-btn { font-family:var(--mono); font-size:11px; color:var(--gray); background:transparent; border:1px solid var(--border); border-radius:6px; padding:4px 10px; cursor:pointer; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* ── MAIN ── */
.main { max-width:960px; margin:0 auto; padding:28px 32px 80px; }
.dash-header {
  background: linear-gradient(135deg, var(--surface2), #1a1f35);
  border:1px solid var(--border); border-radius:12px; padding:24px 28px; margin-bottom:24px;
}
.dash-phrase { font-size:12px; color:var(--text2); line-height:1.8; border-left:3px solid; border-color:inherit; padding-left:14px; margin-bottom:16px; }
.dash-name-row { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; }
.dash-name { font-size:22px; font-weight:700; }
.dash-role { font-size:14px; color:var(--gray); }
.dash-month { font-family:var(--mono); font-size:12px; color:var(--gray); margin-left:auto; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:14px; }
.stat-box { text-align:center; }
.stat-num { font-family:var(--mono); font-size:26px; font-weight:500; }
.stat-lbl { font-size:11px; color:var(--gray); margin-top:2px; }
.overall-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
#progress-fill { height:100%; background:linear-gradient(90deg,#4f8aff,#7c5cfc); border-radius:3px; transition:width 0.6s ease; }

/* ── SECTION ── */
.section { margin-bottom:28px; }
.section-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.section-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.section-title { font-size:14px; font-weight:700; }
.section-count { font-family:var(--mono); font-size:11px; color:var(--gray); margin-left:auto; }

/* ── ITEM CARD ── */
.item-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; transition:border-color 0.2s; }
.item-card:hover { border-color:rgba(79,138,255,0.3); }
.item-card.done { opacity:0.65; }
.item-header { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; }
.status-btn {
  width:18px; height:18px; border-radius:4px; border:2px solid var(--border);
  flex-shrink:0; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center;
}
.item-label { flex:1; font-size:13px; font-weight:500; }
.item-label.done-text { text-decoration:line-through; color:var(--gray); }
.item-tag { font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:4px; background:rgba(79,138,255,0.1); color:#4f8aff; flex-shrink:0; }
.prio-badge { font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:4px; flex-shrink:0; }
.prio-1 { background:rgba(255,92,92,0.12); color:var(--red); }
.prio-2 { background:rgba(245,166,35,0.12); color:#f5a623; }
.prio-3 { background:rgba(79,138,255,0.12); color:#4f8aff; }
.prio-4 { background:rgba(136,144,164,0.12); color:var(--gray); }
.status-text { font-family:var(--mono); font-size:10px; flex-shrink:0; }
.status-text.todo { color:var(--gray); }
.status-text.doing { color:var(--yellow); }
.status-text.done { color:var(--green); }
.status-text.hold { color:var(--red); }

.item-body { display:none; padding:0 16px 14px 46px; }
.item-body.open { display:block; }
.item-desc { font-size:12px; color:var(--text2); margin-bottom:10px; line-height:1.7; }
.memo-area { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
.memo-label { font-family:var(--mono); font-size:10px; color:var(--gray); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
.memo-input { width:100%; background:transparent; border:none; outline:none; color:var(--text2); font-family:var(--sans); font-size:13px; resize:vertical; min-height:56px; line-height:1.7; }
.memo-input::placeholder { color:var(--border); }

/* ── RETRO ── */
.retro-section .item-card { display:none; }
.retro-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:8px; }
.retro-input { min-height:70px; }
.retro-read { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:8px; font-size:13px; color:var(--text2); line-height:1.7; }

/* ── ADMIN ── */
.admin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media(max-width:700px){ .admin-grid { grid-template-columns:1fr 1fr; } }
.admin-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; cursor:pointer; transition:border-color 0.2s; }
.admin-card:hover { border-color:rgba(79,138,255,0.4); }
.admin-card-top { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.admin-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.admin-name { font-size:14px; font-weight:600; }
.admin-role { font-size:11px; color:var(--gray); }
.admin-pct { font-family:var(--mono); font-size:20px; font-weight:500; margin-left:auto; }
.admin-bar-wrap { margin-bottom:10px; }
.admin-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.admin-bar-fill { height:100%; border-radius:2px; transition:width 0.6s; }
.admin-stats { display:flex; gap:12px; font-size:11px; color:var(--gray); }
.admin-stats b { font-weight:600; }
.back-btn { font-size:12px; color:#4f8aff; cursor:pointer; margin-bottom:16px; display:inline-block; }
.back-btn:hover { text-decoration:underline; }
.member-detail-header { display:flex; align-items:center; padding:12px 16px; border-left:3px solid; background:var(--surface2); border-radius:8px; margin-bottom:16px; }
.member-detail-block { display:none; margin-bottom:28px; }
.member-detail-block.open { display:block; }
.card-expand-hint { font-size:10px; color:var(--gray); text-align:right; margin-top:8px; font-family:var(--mono); }
.admin-card { cursor:pointer; }
.admin-memo { font-size:12px; color:var(--gray); padding:6px 16px 10px 46px; line-height:1.6; font-style:italic; }
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">igogo · team</div>
    <div class="login-title">6월 대시보드</div>
    <div class="login-sub">아이고고 팀 계정(@igogo.kr)으로 로그인하세요</div>
    <button class="google-btn" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Google 계정으로 로그인
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── 앱 화면 ── -->
<div id="app-screen">
  <div class="topbar">
    <span class="topbar-logo">TEAM IGOGO ACTION DASHBOARD</span>
    <button class="month-btn active" data-month="2026-06" onclick="changeMonth('2026-06')">6월</button>
    <button class="month-btn" data-month="2026-07" onclick="changeMonth('2026-07')">7월</button>
    <button class="month-btn" data-month="2026-08" onclick="changeMonth('2026-08')">8월</button>
    <button class="month-btn" data-month="2026-09" onclick="changeMonth('2026-09')">9월</button>
    <button class="month-btn" data-month="2026-10" onclick="changeMonth('2026-10')">10월</button>
    <button class="month-btn" data-month="2026-11" onclick="changeMonth('2026-11')">11월</button>
    <button class="month-btn" data-month="2026-12" onclick="changeMonth('2026-12')">12월</button>
    <div class="topbar-right">
      <div class="user-chip">
        <div id="user-avatar"></div>
        <div>
          <div id="user-name"></div>
          <div id="user-role"></div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="dash-header">
      <div class="dash-phrase" id="month-phrase"></div>
      <div class="dash-name-row">
        <span class="dash-name" id="dashboard-name" id="dashboard-accent"></span>
        <span class="dash-role" id="dashboard-role"></span>
        <span class="dash-month" id="dashboard-month"></span>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">전체 항목</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-done" style="color:var(--green)">—</div><div class="stat-lbl">완료</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-doing" style="color:var(--yellow)">—</div><div class="stat-lbl">진행중</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-pct" style="color:#4f8aff">—</div><div class="stat-lbl">달성률</div></div>
      </div>
      <div class="overall-bar"><div id="progress-fill" style="width:0%"></div></div>
    </div>

    <div id="dashboard-content"></div>
  </div>
</div>

</body>
</html>
